apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: fluentd
  namespace: logging

spec:
  selector:
    matchLabels:
      app: fluentd

  template:
    metadata:
      labels:
        app: fluentd

    spec:
      containers:
        - name: fluentd
          image: fluent/fluentd-kubernetes-daemonset:v1-debian-elasticsearch
          volumeMounts:
            - name: varlog
              mountPath: /var/log
            - name: config-volume
              mountPath: /fluentd/etc/

      volumes:
        - name: varlog
          hostPath:
            path: /var/log
        - name: config-volume
          configMap:
      