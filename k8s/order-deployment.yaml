apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image:  707913648704.dkr.ecr.us-east-1.amazonaws.com/product-service:e8ad237
          ports:
            - containerPort: 3001
