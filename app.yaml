apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ecommerce-app
  namespace: argocd
spec:
  project: default   # ✅ THIS IS WHAT YOU ARE MISSING

  source:
    repoURL: https://github.com/Nonsocha/Ecommerce-Microservices.git
    targetRevision: HEAD
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true